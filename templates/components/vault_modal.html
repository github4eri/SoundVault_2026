<div id="uploadModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-0 sm:p-4">
    
    <div onclick="toggleModal()" class="absolute inset-0 bg-slate-950/60 backdrop-blur-md cursor-pointer"></div>

    <div class="relative bg-slate-900 border-t sm:border border-slate-700 w-full h-full sm:h-auto sm:w-[500px] sm:rounded-2xl shadow-2xl overflow-y-auto flex flex-col">
        
        <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 sticky top-0 backdrop-blur-sm z-10">
            <h3 class="text-xl font-black text-white tracking-tight">
                {{ labels.upload_btn }}
            </h3>
        
            <button type="button" 
                    onclick="toggleModal()" 
                    class="group p-2 -mr-2 rounded-full hover:bg-slate-800 transition-all duration-200"
                    aria-label="Close Modal">
                <svg class="w-6 h-6 text-slate-400 group-hover:text-cyan-400 transition-colors" 
                     fill="none" 
                     stroke="currentColor" 
                     viewBox="0 0 24 24" 
                     xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" 
                          stroke-linejoin="round" 
                          stroke-width="2.5" 
                          d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>

        <div class="p-8">
            <form action="/upload" method="post" enctype="multipart/form-data" class="space-y-6">
                
                <div class="space-y-2">
                    <label for="file-upload" class="cursor-pointer flex flex-col items-center justify-center w-full bg-slate-950 border border-slate-800 hover:border-cyan-500 text-slate-400 hover:text-cyan-400 py-6 rounded-xl transition-all">
                        <svg class="w-6 h-6 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                        </svg>
                        
                        <span id="file-name-display" class="font-bold text-xs uppercase tracking-widest text-center px-4 truncate w-full max-w-[250px]">
                            {{ labels.select_artifact }}
                        </span>
                    </label>
                    
                    <input id="file-upload" type="file" name="file" class="hidden" required onchange="updateFileName(this)">
                </div>
                
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest">
                        {{ labels.origin_label }}
                    </label>
                    <select name="origin" required class="w-full bg-slate-950 border border-slate-800 text-slate-300 rounded-xl py-3 px-4 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none cursor-pointer appearance-none text-sm font-bold">
                        <option value="" disabled selected>{{ labels.choose_category }}</option>
                        
                        <option value="human">{{ labels.origin_human }}</option>
                        <option value="nature">{{ labels.origin_nature }}</option>
                        <option value="ai">{{ labels.origin_ai }}</option>   
                    </select>
                </div>
        
                <div class="space-y-2">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest">
                        {{ labels.copyright_label }}
                    </label>
                    <select name="copyright" required class="w-full bg-slate-950 border border-slate-800 text-slate-300 rounded-xl py-3 px-4 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none cursor-pointer appearance-none text-sm font-bold">
                        <option value="" disabled selected>{{ labels.choose_copyright }}</option>
                        <option value="free">{{ labels.copyright_free }}</option>
                        <option value="protected">{{ labels.copyright_protected }}</option>
                    </select>
                </div>

                <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-slate-950 font-black py-4 rounded-xl transition-all shadow-lg shadow-cyan-500/20 mt-4 active:scale-95">
                    {{ labels.upload_btn }}
                </button>
            </form>
        </div>
    </div>
</div>
<script>
    function updateFileName(input) {
        const displaySpan = document.getElementById('file-name-display');
        
        // If a file was successfully selected...
        if (input.files && input.files.length > 0) {
            // Change the text to the file name
            displaySpan.textContent = input.files[0].name;
            // Make the text cyan so it looks "active" and confirmed!
            displaySpan.classList.add('text-cyan-400');
        } else {
            // If they hit cancel, revert back to the dictionary label
            displaySpan.textContent = "{{ labels.select_artifact }}";
            displaySpan.classList.remove('text-cyan-400');
        }
    }
</script>
