<div class="flex justify-between items-end mb-12">
       <div>
           <h2 class="text-4xl font-black text-white tracking-tighter mb-2">
               {{ labels.library_title }}
           </h2>
           <div class="h-1 w-12 bg-cyan-500 rounded-full"></div>
       </div>
   
       <div class="relative w-72">
           <input type="text" name="search" 
                  placeholder="{{ labels.search_placeholder }}" 
                  value="{{ request.query_params.get('search', '') }}"
                  class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-4 pl-12 pr-4 text-sm text-white focus:border-cyan-500/50 transition-all">
           <svg class="absolute left-4 top-4 w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
           </svg>
       </div>
   </div>
